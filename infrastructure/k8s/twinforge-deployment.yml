apiVersion: v1
kind: Namespace
metadata:
  name: twinforge-digital-twin
  labels:
    app.kubernetes.io/name: twinforge
    app.kubernetes.io/component: digital-twin-platform

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: twinforge-config
  namespace: twinforge-digital-twin
data:
  NODE_ENV: "production"
  SIMULATION_TICK_RATE: "50"
  SPATIAL_CELL_SIZE: "10"
  MAX_HISTORY_SIZE: "2000"
  GPU_ACCELERATION: "true"
  EVENT_BUFFER_SIZE: "10000"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twinforge-api
  namespace: twinforge-digital-twin
  labels:
    app: twinforge-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: twinforge-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: twinforge-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: twinforge-api
          image: twinforge-digital-twin-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: twinforge-config
                  key: NODE_ENV
            - name: DATABASE_URL
              value: "file:/data/custom.db"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
              nvidia.com/gpu: "0"
            limits:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: twin-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/observability
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/simulation
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: twin-data
          persistentVolumeClaim:
            claimName: twinforge-data-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twinforge-websocket
  namespace: twinforge-digital-twin
  labels:
    app: twinforge-websocket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twinforge-websocket
  template:
    metadata:
      labels:
        app: twinforge-websocket
    spec:
      containers:
        - name: twinforge-ws
          image: twinforge-digital-twin-ws:latest
          ports:
            - containerPort: 3003
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            tcpSocket:
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: twinforge-api-service
  namespace: twinforge-digital-twin
spec:
  type: ClusterIP
  selector:
    app: twinforge-api
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: twinforge-ws-service
  namespace: twinforge-digital-twin
spec:
  type: ClusterIP
  selector:
    app: twinforge-websocket
  ports:
    - port: 3003
      targetPort: 3003

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twinforge-ingress
  namespace: twinforge-digital-twin
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/websocket-services: twinforge-ws-service
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - twin.example.com
      secretName: twinforge-tls
  rules:
    - host: twin.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: twinforge-api-service
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: twinforge-ws-service
                port:
                  number: 3003

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: twinforge-api-hpa
  namespace: twinforge-digital-twin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: twinforge-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: twinforge-data-pvc
  namespace: twinforge-digital-twin
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: twinforge-viewer
  namespace: twinforge-digital-twin
subjects:
  - kind: ServiceAccount
    name: default
    namespace: twinforge-digital-twin
roleRef:
  kind: Role
  name: twinforge-reader
  apiGroup: rbac.authorization.k8s.io
