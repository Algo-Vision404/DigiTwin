global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'digital-twin-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['digital-twin-api:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-1'

  - job_name: 'digital-twin-ws'
    static_configs:
      - targets: ['digital-twin-ws:3003']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
    jmx_url: 'service:jmx:rmi:///jndi/rmi://kafka:9999/jmxrmi'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'emqx'
    static_configs:
      - targets: ['emqx:18083']

  - job_name: 'flink'
    static_configs:
      - targets: ['flink-jobmanager:8081']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['nvidia-gpu-exporter:9835']
    scrape_interval: 5s
