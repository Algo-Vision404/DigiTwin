<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)"/>

  <!-- Border glow -->
  <rect x="1" y="1" width="126" height="126" rx="27" fill="none" stroke="url(#tGrad)" stroke-width="1" opacity="0.2"/>

  <!-- T letter -->
  <text x="30" y="88" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="68" fill="url(#tGrad)" letter-spacing="-2">T</text>

  <!-- W letter -->
  <text x="62" y="88" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="68" fill="url(#wGrad)" letter-spacing="-2">W</text>

  <!-- Accent line under TW -->
  <line x1="28" y1="96" x2="100" y2="96" stroke="url(#wGrad)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
